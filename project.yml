name: ClaudeMeter

options:
  bundleIdPrefix: com.marioo.claudemeter
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# ---------------------------------------------------------------------------
# Project-wide build settings.
#
#  >>> Set DEVELOPMENT_TEAM to your Apple Developer Team ID before building. <<<
#  (Xcode -> target -> Signing & Capabilities also works; that overrides this.)
#
#  If you change the bundle id prefix below, also update
#  Shared/UsageModels.swift (AppConfig.bundlePrefix).
# ---------------------------------------------------------------------------
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  ClaudeMeter:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
      - Shared
    settings:
      base:
        PRODUCT_NAME: ClaudeMeter
        PRODUCT_BUNDLE_IDENTIFIER: com.marioo.claudemeter
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
